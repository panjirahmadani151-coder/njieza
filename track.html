<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Track Order — Njieza</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="script.js"></script>
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <div class="header-inner">
          <a class="logo" href="index.html">njieza</a>
          <nav class="main-nav" aria-label="Primary navigation">
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="account.html">Account</a>
            <a href="admin.html">Admin</a>
          </nav>
        </div>
      </header>

      <main id="track-page" class="track-page">
        <section class="section-head">
          <p class="section-eyebrow">Track</p>
          <h2>Track your order</h2>
        </section>

        <div class="track-form">
          <label>
            Order ID or Tracking number
            <input type="text" id="track-input" placeholder="NJZ-1635123456789 or NJZABC123" />
          </label>
          <button class="button button-primary" id="track-button">Check</button>
        </div>

        <div id="track-result" class="track-result"></div>
      </main>

      <footer class="site-footer">
        <div class="footer-grid">
          <div>
            <h3>Njieza</h3>
            <p>Clean, functional clothing for everyday life.</p>
          </div>
        </div>
      </footer>
    </div>
    <div class="cart-float" role="button" aria-label="Open cart" onclick="(function(e){const btn=e.currentTarget; (typeof openCart==='function') && openCart(btn); })(event)">
      🛒 <span class="cart-count">0</span>
    </div>
  </body>
</html>
